name: Compare TSC Error Counts
description: Compare the TypeScript error counts on the HEAD branch vs. the base branch.
author: ThinkDX

inputs:
  working-directory:
    description: Directory to run TypeScript in
    required: false
    default: '.'
  package-manager:
    description: Package manager to use (npm, yarn, or pnpm)
    required: false
    default: 'npm'
  pnpm-version:
    description: |
      pnpm version to install (only used when package-manager is pnpm).
      Leave blank to read it from the package.json "packageManager" field.
    required: false
  cache-dependencies:
    description: Whether to enable dependency caching
    required: false
    default: 'true'
  install-command:
    description: Custom install command (overrides default package manager command)
    required: false
  node-version:
    description: Node.js version to use
    required: false
  node-version-file:
    description: Path to custom node version file (relative to working-directory)
    required: false
  tsconfig:
    description: Path to custom tsconfig.json file (relative to working-directory)
    required: false
    default: 'tsconfig.json'
  strict-override:
    description: Whether to override the strict setting to true regardless of tsconfig
    required: false
    default: 'true'
  prebuild-command:
    description: Optional command to run before TypeScript compilation (runs per package)
    required: false
  prebuild-working-directory:
    description: Working directory for prebuild command
    required: false
    default: '.'
  use-head-commit:
    description: Whether to use the head commit SHA instead of the merge SHA
    required: false
    default: 'false'
  is-workspace:
    description: Whether this is a workspace with multiple packages
    required: false
    default: 'false'
  workspace-packages:
    description: Comma-separated list of workspace package directories (only used if is-workspace is true)
    required: false
  workspace-prebuild-command:
    description: Optional command to run before TypeScript compilation (runs at workspace root)
  fail-on-increase:
    description: Whether to fail the workflow when the error count increases
    required: false
    default: 'true'

outputs:
  head-errors:
    description: Number of TypeScript errors in HEAD
    value: ${{ steps.head-check.outputs.error-count }}
  base-errors:
    description: Number of TypeScript errors in BASE
    value: ${{ steps.base-check.outputs.error-count }}
  error-difference:
    description: Difference in error count (HEAD - BASE)
    value: ${{ steps.compare.outputs.difference }}
  errors-increased:
    description: Whether the error count increased
    value: ${{ steps.compare.outputs.increased }}

runs:
  using: "composite"
  steps:
    - name: Check out BASE
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        
    - name: Install dependencies (BASE)
      uses: thinkdx/ts-stricter/install@v2.0.0
      with:
        package-manager: ${{ inputs.package-manager }}
        pnpm-version: ${{ inputs.pnpm-version }}
        working-directory: ${{ inputs.working-directory }}
        cache-dependencies: ${{ inputs.cache-dependencies }}
        install-command: ${{ inputs.install-command }}
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version-file }}

    - name: Run TypeScript check (BASE)
      id: base-check
      uses: thinkdx/ts-stricter/typescript@v2.0.0
      with:
        working-directory: ${{ inputs.working-directory }}
        tsconfig: ${{ inputs.tsconfig }}
        strict-override: ${{ inputs.strict-override }}
        prebuild-command: ${{ inputs.prebuild-command }}
        prebuild-working-directory: ${{ inputs.prebuild-working-directory }}
        is-workspace: ${{ inputs.is-workspace }}
        workspace-packages: ${{ inputs.workspace-packages }}
        workspace-prebuild-command: ${{ inputs.workspace-prebuild-command }}

    - name: Check out HEAD (merged)
      if: ${{ inputs.use-head-commit == 'false' }}
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}

    - name: Check out HEAD (direct)
      if: ${{ inputs.use-head-commit == 'true' }}
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        
    - name: Install dependencies (HEAD)
      uses: thinkdx/ts-stricter/install@v2.0.0
      with:
        package-manager: ${{ inputs.package-manager }}
        pnpm-version: ${{ inputs.pnpm-version }}
        working-directory: ${{ inputs.working-directory }}
        cache-dependencies: ${{ inputs.cache-dependencies }}
        install-command: ${{ inputs.install-command }}
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version-file }}

    - name: Run TypeScript check (HEAD)
      id: head-check
      uses: thinkdx/ts-stricter/typescript@v2.0.0
      with:
        working-directory: ${{ inputs.working-directory }}
        tsconfig: ${{ inputs.tsconfig }}
        strict-override: ${{ inputs.strict-override }}
        prebuild-command: ${{ inputs.prebuild-command }}
        prebuild-working-directory: ${{ inputs.prebuild-working-directory }}
        is-workspace: ${{ inputs.is-workspace }}
        workspace-packages: ${{ inputs.workspace-packages }}
        workspace-prebuild-command: ${{ inputs.workspace-prebuild-command }}

    - name: Compare error counts
      id: compare
      uses: thinkdx/ts-stricter/compare@v2.0.0
      with:
        head-errors: ${{ steps.head-check.outputs.error-count }}
        base-errors: ${{ steps.base-check.outputs.error-count }}
        head-package-errors: ${{ steps.head-check.outputs.package-errors }}
        base-package-errors: ${{ steps.base-check.outputs.package-errors }}
        is-workspace: ${{ inputs.is-workspace }}
        fail-on-increase: ${{ inputs.fail-on-increase }}
