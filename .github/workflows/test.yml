name: Test

on:
  push:
    branches: [main, v2]
  pull_request:

jobs:
  scripts:
    name: Script logic (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run test harness
        run: ./test/run-tests.sh
